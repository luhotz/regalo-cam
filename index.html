<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>¡FELIS CUMPLE CAM!</title>
    <style>
        body {
            background-color: magenta;
            animation: colorChange 0.3s infinite; 
            font-family: "Comic Sans MS", cursive, sans-serif;
            overflow-x: hidden;
            text-align: center;
            color: white;
            cursor: help;
        }

        @keyframes colorChange {
            0% {background-color: #ff00ff;}
            33% {background-color: #00ffff;}
            66% {background-color: #ffff00;}
            100% {background-color: #ff0000;}
        }

        .titulo-loco {
            font-size: 50px;
            text-shadow: 3px 3px #000;
            animation: bounce 0.5s infinite alternate;
        }

        @keyframes bounce {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        .marquesina {
            font-size: 25px;
            background: yellow;
            color: red;
            font-weight: bold;
            padding: 10px;
            border: 4px ridge black;
        }

        .contenedor-videos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
            gap: 15px;
            padding: 20px;
        }

        video {
            width: 100%;
            height: 180px; 
            object-fit: cover;
            border: 4px solid white;
            box-shadow: 5px 5px 0px black;
        }

        .boton-misterioso {
            padding: 15px 30px;
            font-size: 20px;
            background: lime;
            color: black;
            font-weight: bold;
            border: 5px outset white;
            cursor: pointer;
            margin: 20px;
        }
    </style>
</head>
<body onclick="activarCaos()">

</html>
