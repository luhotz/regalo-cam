<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡FELIS CUMPLE CAM!</title>
    <style>
        body {
            background-color: magenta;
            animation: colorChange 0.3s infinite; 
            font-family: "Comic Sans MS", cursive, sans-serif;
            overflow-x: hidden;
            text-align: center;
            color: white;
            cursor: help;
            margin: 0;
            padding: 0;
        }

        @keyframes colorChange {
            0% {background-color: #ff00ff;}
            33% {background-color: #00ffff;}
            66% {background-color: #ffff00;}
            100% {background-color: #ff0000;}
        }

        .titulo-loco {
            font-size: 10vw; /* Tamaño dinámico según el ancho de pantalla */
            text-shadow: 3px 3px #000;
            animation: bounce 0.5s infinite alternate;
            padding: 10px;
        }

        @keyframes bounce {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        .marquesina {
            font-size: 20px;
            background: yellow;
            color: red;
            font-weight: bold;
            padding: 10px;
            border: 4px ridge black;
            white-space: nowrap;
        }

        .contenedor-videos {
            display: grid;
            /* Se adapta: 1 columna en celulres pequeños, 2 o más en pantallas grandes */
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); 
            gap: 10px;
            padding: 15px;
        }

        video {
            width: 100%;
            height: 150px; 
            object-fit: cover;
            border: 4px solid white;
            box-shadow: 5px 5px 0px black;
        }

        .boton-misterioso {
            width: 90%; /* Casi todo el ancho en celular */
            max-width: 400px;
            padding: 20px;
            font-size: 18px;
            background: lime;
            color: black;
            font-weight: bold;
            border: 5px outset white;
            cursor: pointer;
            margin: 20px auto;
            display: block;
        }

        .hola-texto {
            font-size: 20vw; 
            color: yellow; 
            text-shadow: 5px 5px 0 black;
            margin-bottom: 50px;
        }
    </style>
</head>
<body onclick="activarCaos()">

    <h1 class="titulo-loco">ffELIZ CUMMPLE CAM,</h1>

    <div class="marquesina">
        <marquee scrollamount="20">
            HOLAA CAM NO TE DI REGALO PERO TE HICE ESTA BABOSADAAAAAAASDASDASAA 🎉🎁🎈
        </marquee>
    </div>

    <button class="boton-misterioso">
        SOLO TOCA AQUÍ Y SUBE EL VOLUMEN 🔊
    </button>

    <div class="contenedor-videos">
        <video src="vid2.mp4" autoplay loop muted playsinline></video>
        <video src="vid3.mp4" autoplay loop muted playsinline></video>
        <video src="vid5.mp4" autoplay loop muted playsinline></video>
        <video src="vid4.mp4" autoplay loop muted playsinline></video>
        <video src="vid1.mp4" autoplay loop muted playsinline></video>
    </div>

    <p class="hola-texto">hola</p>

    <script>
        function activarCaos() {
            const todosLosVideos = document.querySelectorAll('video');
            
            todosLosVideos.forEach(v => {
                v.muted = false; 
                v.play().catch(e => console.log("Error al reproducir:", e));        
            });
            
            console.log("¡MODO CAOS ACTIVADO!");
        }

        alert("ola cam dale aceptar");
    </script>

</body>
</html>
